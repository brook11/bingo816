setTimeout(()=>{try{initC();tick();}catch(e){}},300);
function iV(){voices=window.speechSynthesis?speechSynthesis.getVoices():[];const b=document.getElementById('vbg');if(!window.speechSynthesis){b.textContent='不支援';b.className='vbg err';return;}b.textContent=voices.length?`${voices.length} 個聲音`:'載入中...';b.className=voices.length?'vbg ok':'vbg';uV();}
function uV(){const lang=document.getElementById('vlang').value;voices=speechSynthesis.getVoices();sV=voices.find(v=>v.lang===lang)||voices.find(v=>v.lang.startsWith(lang.split('-')[0]))||null;const b=document.getElementById('vbg');if(sV){b.textContent=sV.name.slice(0,16);b.className='vbg ok';}else if(voices.length){b.textContent='找不到聲音';b.className='vbg err';}}
function toggleVoice(){if(!window.speechSynthesis){alert('不支援語音播報');return;}vOn=!vOn;const btn=document.getElementById('vtgl'),ic=document.getElementById('vi'),lb=document.getElementById('vl');if(vOn){btn.className='vtgl on';ic.className='ti ti-microphone';lb.textContent='語音開啟';if(!voices.length)iV();spkT();}else{btn.className='vtgl';ic.className='ti ti-microphone-off';lb.textContent='已關閉';speechSynthesis.cancel();}}
function spk(n){if(!vOn||!window.speechSynthesis)return;speechSynthesis.cancel();const lang=document.getElementById('vlang').value,rate=parseFloat(document.getElementById('vspd').value)||1;uV();const u=new SpeechSynthesisUtterance();u.lang=lang;u.rate=rate;if(sV)u.voice=sV;u.text=lang.startsWith('zh')?`第 ${n} 號`:lang.startsWith('ja')?`${n}番`:`Number ${n}`;speechSynthesis.speak(u);}
function spkT(){setTimeout(()=>{const lang=document.getElementById('vlang').value,rate=parseFloat(document.getElementById('vspd').value)||1;uV();const u=new SpeechSynthesisUtterance();u.lang=lang;u.rate=rate;if(sV)u.voice=sV;u.text=lang.startsWith('zh')?'語音播報已開啟':lang.startsWith('ja')?'音声が有効です':'Voice enabled';speechSynthesis.speak(u);},200);}
function setIdle(){const b=document.getElementById('ball');b.style.background='rgba(255,255,255,.28)';b.style.borderColor='rgba(255,255,255,.65)';document.getElementById('bli').style.display='';document.getElementById('bc').style.display='none';document.getElementById('d2').className='dg d2';}
function showN(n,col){const s=String(n),b=document.getElementById('ball');b.style.background=col+'44';b.style.borderColor=col+'99';b.classList.remove('bp');void b.offsetWidth;b.classList.add('bp');document.getElementById('bli').style.display='none';document.getElementById('bc').style.display='flex';const d1=document.getElementById('d1'),d2=document.getElementById('d2');d1.textContent=s[0]||'';if(s.length>=2){d2.textContent=s[1];d2.style.display='inline-block';d2.className='dg d2';setTimeout(()=>d2.classList.add('show'),80);}else{d2.textContent='';d2.style.display='none';}}
function burst(col){const ma=document.querySelector('.ma');for(let i=0;i<3;i++){setTimeout(()=>{const r=document.createElement('div');r.style.cssText=`position:absolute;border-radius:50%;border:2px solid ${col};top:50%;left:50%;width:80px;height:80px;margin-top:-40px;margin-left:-40px;pointer-events:none;animation:bO .7s ease-out forwards;`;ma.appendChild(r);setTimeout(()=>r.remove(),750);},i*120);}}
function conf(col){const cs=[col,'#fff','rgba(255,255,255,.9)','#a7f3ee','#ccfbf1','#fde68a'];for(let i=0;i<30;i++){setTimeout(()=>{const el=document.createElement('div');el.className='cp';const w=5+Math.random()*8,h=4+Math.random()*7;el.style.cssText=`width:${w}px;height:${h}px;left:${5+Math.random()*90}%;top:0;background:${cs[Math.floor(Math.random()*cs.length)]};animation-delay:${Math.random()*.45}s;animation-duration:${1+Math.random()*.7}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),2100);},i*14);}}
function updS(){document.getElementById('dc').textContent=hist.length;document.getElementById('rc').textContent=pool.length;document.getElementById('ln').textContent=hist.length?hist[hist.length-1]:'—';}
function addB(n,col){const ct=document.getElementById('hb'),e=ct.querySelector('.eh');if(e)e.remove();const b=document.createElement('div');b.className='hball';b.title=`${n} 號`;b.textContent=n;b.style.background=col;b.style.borderColor='rgba(255,255,255,.75)';ct.appendChild(b);ct.scrollTop=ct.scrollHeight;}
function startBar(){clearInterval(tA);tP=0;tM=gI();const bar=document.getElementById('tb');bar.style.width='100%';tA=setInterval(()=>{if(paused)return;tP+=STP;bar.style.width=Math.max(0,100-tP/tM*100)+'%';},STP);}
function drawNext(){if(pool.length===0){document.getElementById('st').textContent='🎉 所有號碼已抽完！';doStop();return;}const n=pool.shift(),col=nC();hist.push(n);showN(n,col);burst(col);document.getElementById('st').textContent=`抽出號碼：${n} 號`;addB(n,col);updS();conf(col);spk(n);startBar();}
function startGame(){if(paused){paused=false;document.getElementById('bp').innerHTML='<i class="ti ti-player-pause"></i> 暫停';document.getElementById('st').textContent='繼續抽號中...';return;}pool=shuf([...Array(gM())].map((_,i)=>i+1));hist=[];uC=[];document.getElementById('hb').innerHTML='<span class="eh">尚未抽出號碼</span>';setIdle();updS();cancelStop();running=true;document.getElementById('bs').disabled=true;document.getElementById('bp').disabled=false;document.getElementById('be').disabled=false;document.getElementById('mns').disabled=true;document.getElementById('mni').disabled=true;document.getElementById('ivs').disabled=true;document.getElementById('ivi').disabled=true;document.getElementById('tbw').style.display='block';drawNext();tmr=setInterval(()=>{if(!paused)drawNext();},gI());}
function pauseGame(){if(!running)return;paused=!paused;document.getElementById('bp').innerHTML=paused?'<i class="ti ti-player-play"></i> 繼續':'<i class="ti ti-player-pause"></i> 暫停';document.getElementById('st').textContent=paused?'⏸ 已暫停':'繼續抽號中...';}
function askStop(){document.getElementById('cfm').className='cfm show';}
function cancelStop(){document.getElementById('cfm').className='cfm';}
function confirmStop(){cancelStop();doStop();}
function doStop(){clearInterval(tmr);clearInterval(tA);tmr=null;running=false;paused=false;document.getElementById('bs').disabled=false;document.getElementById('bp').disabled=true;document.getElementById('bp').innerHTML='<i class="ti ti-player-pause"></i> 暫停';document.getElementById('be').disabled=true;document.getElementById('mns').disabled=false;document.getElementById('mni').disabled=false;document.getElementById('ivs').disabled=false;document.getElementById('ivi').disabled=false;document.getElementById('tbw').style.display='none';if(pool.length>0||hist.length===0)document.getElementById('st').textContent='已結束。按「開始」重新抽號';}
function clearHistory(){hist=[];uC=[];document.getElementById('hb').innerHTML='<span class="eh">尚未抽出號碼</span>';updS();}
document.getElementById('rc').textContent=gM();
if(window.speechSynthesis){if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=iV;setTimeout(iV,300);}
</script>
</body>
